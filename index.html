<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ XpertSound Montpellier | Funky Disco Salsa Reggae Party</title>

<meta name="description" content="DJ XpertSound à Montpellier spécialisé dans les soirées Funky, Disco, Salsa, Reggae et événements festifs. DJ mobile original pour anniversaires, mariages, soirées privées et événements publics.">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
font-family:'Montserrat',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.light-bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,255,.15), transparent 20%),
radial-gradient(circle at 80% 30%, rgba(255,255,0,.12), transparent 20%),
radial-gradient(circle at 50% 80%, rgba(0,255,255,.12), transparent 20%);
animation:move 10s infinite alternate;
z-index:-1;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
background:
linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
url('assets/funky.png') center/cover no-repeat;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
}

.logo{
font-size:2rem;
font-weight:800;
color:#ffd700;
}

/* 🔥 ICONES SOCIAL */
.socials{
display:flex;
gap:25px;
}

.socials a{
color:white;
font-size:26px;
transition:.3s;
}

.socials a:hover{
color:#ffd700;
transform:scale(1.3);
text-shadow:0 0 12px #ffd700;
}

.hero-content{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content h1{
font-size:4rem;
margin-bottom:20px;
}

.price-box{
margin:35px 0;
padding:25px 40px;
border-radius:20px;
background:rgba(255,215,0,.08);
border:1px solid rgba(255,215,0,.35);
}

.price{
font-size:4rem;
color:#ffd700;
font-weight:800;
}

.btn{
display:inline-block;
padding:18px 35px;
background:#ffd700;
color:black;
text-decoration:none;
border-radius:40px;
font-weight:700;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,215,0,.4);
}

section{
padding:90px 8%;
}

.intro{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
margin-top:40px;
}

.card img{
width:100%;
height:420px;
object-fit:cover;
border-radius:20px;
}

.overlay{
text-align:center;
margin-top:-60px;
font-size:1.5rem;
font-weight:700;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.feature{
background:#111;
padding:35px;
border-radius:20px;
}

.contact form{
display:flex;
flex-direction:column;
gap:20px;
max-width:700px;
margin:auto;
}

input,textarea{
padding:18px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

footer{
padding:25px;
text-align:center;
opacity:.7;
}

</style>

</head>

<body>

<div class="light-bg"></div>

<header class="hero">

<nav>

<div class="logo">XpertSound.fr</div>

<div class="socials">

<a href="https://wa.me/babyrasta34"><i class="fab fa-whatsapp"></i></a>
<a href="https://www.instagram.com/xpertsound/"><i class="fab fa-instagram"></i></a>
<a href="https://www.facebook.com/XpertSound"><i class="fab fa-facebook"></i></a>
<a href="https://www.youtube.com/user/babyrasta034/featured"><i class="fab fa-youtube"></i></a>

</div>

</nav>

<div class="hero-content">

<h1>DJ Mobile en Vélo à Montpellier</h1>

<p>Ambiance Funky, Disco, Salsa et Reggae</p>

<div class="price-box">
<span class="price">150€</span>
</div>

<a class="btn" href="#contact">Réserver</a>

</div>

</header>

<!-- ===== SECTION INTRO ===== -->
<section class="intro">
<div>
<h2>Une prestation unique</h2>
<p>Concept DJ mobile original, ambiance festive et élégante.</p>
</div>

<div>
<img src="assets/hero.png">
</div>
</section>

<!-- ===== GALLERY ===== -->
<section>
<h2 style="text-align:center;color:#ffd700;">Ambiances</h2>

<div class="cards">

<div>
<img src="assets/reggae.png">
<div class="overlay">Reggae</div>
</div>

<div>
<img src="assets/salsa.png">
<div class="overlay">Salsa</div>
</div>

<div>
<img src="assets/funky.png">
<div class="overlay">Funky</div>
</div>

</div>
</section>

<!-- ===== FEATURES ===== -->
<section class="features">

<div class="feature">DJ Mobile</div>
<div class="feature">Ambiance Lumière</div>
<div class="feature">Mix Live</div>

</section>

<!-- ===== CONTACT ===== -->
<section class="contact" id="contact">

<h2 style="text-align:center;color:#ffd700;">Contact</h2>

<form>

<input type="text" placeholder="Nom">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>

<button class="btn" type="submit">Envoyer</button>

</form>

</section>

<footer>
© XpertSound
</footer>

</body>
</html>
