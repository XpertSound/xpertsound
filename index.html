<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
font-family:'Montserrat',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
.light-bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,255,.15), transparent 20%),
radial-gradient(circle at 80% 30%, rgba(255,255,0,.12), transparent 20%),
radial-gradient(circle at 50% 80%, rgba(0,255,255,.12), transparent 20%);
animation:move 10s infinite alternate;
z-index:-1;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* ===== HERO ===== */
.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
url('assets/funky.png') center/cover no-repeat;
display:flex;
flex-direction:column;
}

/* ===== NAV ===== */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
}

.logo{
font-size:2rem;
font-weight:800;
color:#ffd700;
}

/* ===== SOCIALS (MODIFIÉ AVEC ICÔNES) ===== */
.socials{
display:flex;
gap:25px;
align-items:center;
}

.socials a{
text-decoration:none;
color:white;
font-size:22px;
transition:.3s;
}

.socials a:hover{
color:#ffd700;
transform:scale(1.3);
text-shadow:0 0 12px #ffd700;
}

/* ===== HERO CONTENT ===== */
.hero-content{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content h1{
font-size:4.5rem;
margin-bottom:20px;
}

.hero-content p{
max-width:700px;
line-height:1.8;
font-size:1.1rem;
}

/* ===== PRIX ===== */
.price-box{
margin:35px 0;
padding:25px 40px;
border-radius:20px;
background:rgba(255,215,0,.08);
border:1px solid rgba(255,215,0,.35);
backdrop-filter:blur(8px);
}

.price{
display:block;
font-size:4rem;
font-weight:800;
color:#ffd700;
}

/* ===== BUTTON ===== */
.btn{
display:inline-block;
padding:18px 35px;
background:#ffd700;
color:black;
text-decoration:none;
border-radius:40px;
font-weight:700;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,215,0,.4);
}

/* ===== SECTIONS ===== */
section{padding:90px 8%;}

/* ===== INTRO ===== */
.intro{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

/* ===== CARDS ===== */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
position:relative;
overflow:hidden;
border-radius:20px;
cursor:pointer;
}

.card img{
width:100%;
height:420px;
object-fit:cover;
transition:.5s;
}

.card:hover img{transform:scale(1.05);}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent, rgba(0,0,0,.9));
font-size:1.5rem;
font-weight:700;
}

/* ===== FEATURES ===== */
.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.feature{
background:#111;
padding:35px;
border-radius:20px;
transition:.3s;
}

.feature:hover{transform:translateY(-8px);}

/* ===== CONTACT ===== */
.contact form{
display:flex;
flex-direction:column;
gap:20px;
max-width:700px;
margin:auto;
}

.contact input,
.contact textarea{
padding:18px;
border:none;
border-radius:12px;
background:#111;
color:white;
}

/* ===== FOOTER ===== */
footer{
padding:25px;
text-align:center;
opacity:.7;
}

/* ===== SOCIAL ICONS SIZE ===== */
.socials a i{
font-size:28px;
}

</style>

</div>

</div>
